<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="url(#bgGrad)"/>
  
  <!-- Dot grid -->
  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="900" height="550" fill="url(#dots)"/>
  </g>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="system-ui">🕸️ Attack Graph Visualization</text>
  
  <!-- Main incident node -->
  <circle cx="450" cy="275" r="45" fill="#ff4757" stroke="#ff6b7a" stroke-width="3">
    <animate attributeName="r" values="45;48;45" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="270" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui">Incident</text>
  <text x="450" y="285" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui">#INC-0042</text>
  
  <!-- IP Nodes -->
  <circle cx="200" cy="180" r="30" fill="#ffa502" stroke="#ffb732" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">IP</text>
  <text x="200" y="190" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">192.168.1.50</text>
  
  <circle cx="150" cy="350" r="30" fill="#ffa502" stroke="#ffb732" stroke-width="2"/>
  <text x="150" y="345" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">IP</text>
  <text x="150" y="360" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">10.0.0.100</text>
  
  <!-- Domain Nodes -->
  <circle cx="700" cy="150" r="30" fill="#eccc68" stroke="#f5d98a" stroke-width="2"/>
  <text x="700" y="145" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">Domain</text>
  <text x="700" y="160" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">evil.com</text>
  
  <circle cx="720" cy="380" r="30" fill="#eccc68" stroke="#f5d98a" stroke-width="2"/>
  <text x="720" y="375" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">Domain</text>
  <text x="720" y="390" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">c2.bad.net</text>
  
  <!-- Host Nodes -->
  <circle cx="350" cy="450" r="30" fill="#1e90ff" stroke="#4da6ff" stroke-width="2"/>
  <text x="350" y="445" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">Host</text>
  <text x="350" y="460" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">web-srv-01</text>
  
  <circle cx="550" cy="450" r="30" fill="#1e90ff" stroke="#4da6ff" stroke-width="2"/>
  <text x="550" y="445" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">Host</text>
  <text x="550" y="460" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">db-primary</text>
  
  <!-- User Nodes -->
  <circle cx="280" cy="100" r="28" fill="#2ed573" stroke="#5ae094" stroke-width="2"/>
  <text x="280" y="95" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">User</text>
  <text x="280" y="110" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">admin</text>
  
  <circle cx="620" cy="100" r="28" fill="#2ed573" stroke="#5ae094" stroke-width="2"/>
  <text x="620" y="95" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">User</text>
  <text x="620" y="110" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">jsmith</text>
  
  <!-- Hash Nodes -->
  <circle cx="800" cy="275" r="28" fill="#a55eea" stroke="#b87ef0" stroke-width="2"/>
  <text x="800" y="270" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">Hash</text>
  <text x="800" y="285" text-anchor="middle" fill="#fff" font-size="7" font-family="system-ui">a1b2c3...</text>
  
  <!-- Rule Node -->
  <circle cx="100" cy="275" r="28" fill="#ff6b81" stroke="#ff8fa0" stroke-width="2"/>
  <text x="100" y="270" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="system-ui">Rule</text>
  <text x="100" y="285" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">R-0512</text>
  
  <!-- Connections -->
  <line x1="230" y1="195" x2="410" y2="250" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="180" y1="330" x2="415" y2="295" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="670" y1="165" x2="490" y2="250" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="690" y1="360" x2="490" y2="295" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="370" y1="425" x2="430" y2="310" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="530" y1="425" x2="470" y2="310" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="300" y1="125" x2="420" y2="240" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="600" y1="125" x2="480" y2="240" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="772" y1="265" x2="495" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="128" y1="270" x2="405" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  
  <!-- Legend -->
  <rect x="30" y="480" width="840" height="50" rx="8" fill="rgba(255,255,255,0.05)"/>
  <circle cx="70" cy="505" r="10" fill="#ff4757"/>
  <text x="90" y="509" fill="#888" font-size="11" font-family="system-ui">Incident</text>
  <circle cx="180" cy="505" r="10" fill="#ffa502"/>
  <text x="200" y="509" fill="#888" font-size="11" font-family="system-ui">IP</text>
  <circle cx="270" cy="505" r="10" fill="#eccc68"/>
  <text x="290" y="509" fill="#888" font-size="11" font-family="system-ui">Domain</text>
  <circle cx="380" cy="505" r="10" fill="#1e90ff"/>
  <text x="400" y="509" fill="#888" font-size="11" font-family="system-ui">Host</text>
  <circle cx="480" cy="505" r="10" fill="#2ed573"/>
  <text x="500" y="509" fill="#888" font-size="11" font-family="system-ui">User</text>
  <circle cx="570" cy="505" r="10" fill="#a55eea"/>
  <text x="590" y="509" fill="#888" font-size="11" font-family="system-ui">Hash</text>
  <circle cx="660" cy="505" r="10" fill="#ff6b81"/>
  <text x="680" y="509" fill="#888" font-size="11" font-family="system-ui">Rule</text>
</svg>