<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099ff"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="cardGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="70" height="700" fill="#0a0a12"/>
  <circle cx="35" cy="35" r="18" fill="url(#cardGrad2)" opacity="0.8"/>
  <text x="35" y="42" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🛡️</text>
  
  <!-- Sidebar Icons -->
  <rect x="20" y="80" width="30" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="20" y="120" width="30" height="30" rx="6" fill="rgba(255,255,255,0.05)"/>
  <rect x="20" y="160" width="30" height="30" rx="6" fill="rgba(255,255,255,0.05)"/>
  <rect x="20" y="200" width="30" height="30" rx="6" fill="rgba(255,255,255,0.05)"/>
  <rect x="20" y="240" width="30" height="30" rx="6" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Header -->
  <text x="100" y="50" fill="#fff" font-size="24" font-weight="bold" font-family="system-ui">AI SOC Platform</text>
  <text x="100" y="75" fill="#888" font-size="14" font-family="system-ui">Security Operations Dashboard</text>
  
  <!-- Status indicator -->
  <circle cx="1120" cy="40" r="6" fill="#22c55e"/>
  <text x="1100" y="45" text-anchor="end" fill="#888" font-size="12" font-family="system-ui">Live</text>
  
  <!-- Status Cards Row -->
  <g transform="translate(100, 100)">
    <!-- Card 1: Total Incidents -->
    <rect x="0" y="0" width="170" height="90" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="30" cy="45" r="20" fill="url(#cardGrad1)" opacity="0.2"/>
    <text x="30" y="52" text-anchor="middle" fill="url(#cardGrad1)" font-size="20">📁</text>
    <text x="70" y="40" fill="#888" font-size="11" font-family="system-ui">TOTAL INCIDENTS</text>
    <text x="70" y="65" fill="url(#cardGrad1)" font-size="28" font-weight="bold" font-family="system-ui">247</text>
    
    <!-- Card 2: Enriched -->
    <rect x="190" y="0" width="170" height="90" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="220" cy="45" r="20" fill="url(#cardGrad2)" opacity="0.2"/>
    <text x="220" y="52" text-anchor="middle" fill="url(#cardGrad2)" font-size="20">🔍</text>
    <text x="260" y="40" fill="#888" font-size="11" font-family="system-ui">ENRICHED</text>
    <text x="260" y="65" fill="url(#cardGrad2)" font-size="28" font-weight="bold" font-family="system-ui">198</text>
    
    <!-- Card 3: Investigated -->
    <rect x="380" y="0" width="170" height="90" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="410" cy="45" r="20" fill="url(#cardGrad3)" opacity="0.2"/>
    <text x="410" y="52" text-anchor="middle" fill="url(#cardGrad3)" font-size="20">🧠</text>
    <text x="450" y="40" fill="#888" font-size="11" font-family="system-ui">INVESTIGATED</text>
    <text x="450" y="65" fill="url(#cardGrad3)" font-size="28" font-weight="bold" font-family="system-ui">156</text>
    
    <!-- Card 4: Critical -->
    <rect x="570" y="0" width="170" height="90" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="600" cy="45" r="20" fill="url(#cardGrad4)" opacity="0.2"/>
    <text x="600" y="52" text-anchor="middle" fill="url(#cardGrad4)" font-size="20">⚠️</text>
    <text x="640" y="40" fill="#888" font-size="11" font-family="system-ui">CRITICAL</text>
    <text x="640" y="65" fill="url(#cardGrad4)" font-size="28" font-weight="bold" font-family="system-ui">12</text>
  </g>
  
  <!-- Alert Stream Panel -->
  <g transform="translate(100, 210)">
    <rect x="0" y="0" width="540" height="250" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="bold" font-family="system-ui">🔔 Alert Stream</text>
    <text x="145" y="30" fill="#888" font-size="11" font-family="system-ui">247 alerts</text>
    
    <!-- Filter buttons -->
    <rect x="280" y="15" width="50" height="22" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="305" y="30" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui">All</text>
    <rect x="340" y="15" width="60" height="22" rx="4" fill="rgba(239,68,68,0.2)"/>
    <text x="370" y="30" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui">Critical</text>
    
    <!-- Table header -->
    <line x1="20" y1="50" x2="520" y2="50" stroke="rgba(255,255,255,0.1)"/>
    <text x="20" y="70" fill="#666" font-size="10" font-family="system-ui">TIME</text>
    <text x="120" y="70" fill="#666" font-size="10" font-family="system-ui">AGENT</text>
    <text x="220" y="70" fill="#666" font-size="10" font-family="system-ui">DESCRIPTION</text>
    <text x="460" y="70" fill="#666" font-size="10" font-family="system-ui">SEVERITY</text>
    
    <!-- Alert rows -->
    <text x="20" y="100" fill="#888" font-size="11" font-family="system-ui">10:32:15</text>
    <text x="120" y="100" fill="#fff" font-size="11" font-family="system-ui">web-server-01</text>
    <text x="220" y="100" fill="#fff" font-size="11" font-family="system-ui">Brute force attack detected</text>
    <rect x="460" y="88" width="50" height="18" rx="4" fill="rgba(239,68,68,0.2)"/>
    <text x="485" y="100" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui">Critical</text>
    
    <text x="20" y="130" fill="#888" font-size="11" font-family="system-ui">10:31:42</text>
    <text x="120" y="130" fill="#fff" font-size="11" font-family="system-ui">db-primary</text>
    <text x="220" y="130" fill="#fff" font-size="11" font-family="system-ui">Suspicious SQL query detected</text>
    <rect x="460" y="118" width="40" height="18" rx="4" fill="rgba(249,115,22,0.2)"/>
    <text x="480" y="130" text-anchor="middle" fill="#f97316" font-size="10" font-family="system-ui">High</text>
    
    <text x="20" y="160" fill="#888" font-size="11" font-family="system-ui">10:30:58</text>
    <text x="120" y="160" fill="#fff" font-size="11" font-family="system-ui">app-server-03</text>
    <text x="220" y="160" fill="#fff" font-size="11" font-family="system-ui">Failed authentication attempt</text>
    <rect x="460" y="148" width="50" height="18" rx="4" fill="rgba(234,179,8,0.2)"/>
    <text x="485" y="160" text-anchor="middle" fill="#eab308" font-size="10" font-family="system-ui">Medium</text>
    
    <text x="20" y="190" fill="#888" font-size="11" font-family="system-ui">10:29:33</text>
    <text x="120" y="190" fill="#fff" font-size="11" font-family="system-ui">firewall-01</text>
    <text x="220" y="190" fill="#fff" font-size="11" font-family="system-ui">Port scan detected from external IP</text>
    <rect x="460" y="178" width="40" height="18" rx="4" fill="rgba(249,115,22,0.2)"/>
    <text x="480" y="190" text-anchor="middle" fill="#f97316" font-size="10" font-family="system-ui">High</text>
  </g>
  
  <!-- Risk Heatmap Panel -->
  <g transform="translate(660, 210)">
    <rect x="0" y="0" width="440" height="250" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="bold" font-family="system-ui">📊 Risk Distribution</text>
    <text x="175" y="30" fill="#888" font-size="11" font-family="system-ui">Top 10 by severity</text>
    
    <!-- Bar chart -->
    <rect x="40" y="60" width="25" height="150" rx="4" fill="url(#cardGrad4)"/>
    <rect x="80" y="80" width="25" height="130" rx="4" fill="url(#cardGrad4)"/>
    <rect x="120" y="90" width="25" height="120" rx="4" fill="#f97316"/>
    <rect x="160" y="100" width="25" height="110" rx="4" fill="#f97316"/>
    <rect x="200" y="110" width="25" height="100" rx="4" fill="#f97316"/>
    <rect x="240" y="130" width="25" height="80" rx="4" fill="#eab308"/>
    <rect x="280" y="140" width="25" height="70" rx="4" fill="#eab308"/>
    <rect x="320" y="155" width="25" height="55" rx="4" fill="#eab308"/>
    <rect x="360" y="170" width="25" height="40" rx="4" fill="#22c55e"/>
    <rect x="400" y="180" width="25" height="30" rx="4" fill="#22c55e"/>
    
    <!-- Legend -->
    <circle cx="60" cy="235" r="5" fill="#ef4444"/>
    <text x="75" y="238" fill="#888" font-size="10" font-family="system-ui">Critical</text>
    <circle cx="140" cy="235" r="5" fill="#f97316"/>
    <text x="155" y="238" fill="#888" font-size="10" font-family="system-ui">High</text>
    <circle cx="210" cy="235" r="5" fill="#eab308"/>
    <text x="225" y="238" fill="#888" font-size="10" font-family="system-ui">Medium</text>
    <circle cx="290" cy="235" r="5" fill="#22c55e"/>
    <text x="305" y="238" fill="#888" font-size="10" font-family="system-ui">Low</text>
  </g>
  
  <!-- Knowledge Graph Preview -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="540" height="200" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="bold" font-family="system-ui">🕸️ Attack Graph</text>
    
    <!-- Graph nodes -->
    <circle cx="200" cy="100" r="25" fill="#ff4757" stroke="#ff6b7a" stroke-width="2"/>
    <text x="200" y="105" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui">Incident</text>
    
    <circle cx="100" cy="80" r="18" fill="#ffa502" stroke="#ffb732" stroke-width="2"/>
    <text x="100" y="84" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">IP</text>
    
    <circle cx="300" cy="70" r="18" fill="#eccc68" stroke="#f5d98a" stroke-width="2"/>
    <text x="300" y="74" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">Domain</text>
    
    <circle cx="150" cy="160" r="18" fill="#2ed573" stroke="#5ae094" stroke-width="2"/>
    <text x="150" y="164" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">User</text>
    
    <circle cx="280" cy="150" r="18" fill="#1e90ff" stroke="#4da6ff" stroke-width="2"/>
    <text x="280" y="154" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">Host</text>
    
    <circle cx="400" cy="120" r="18" fill="#a55eea" stroke="#b87ef0" stroke-width="2"/>
    <text x="400" y="124" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui">Hash</text>
    
    <!-- Connections -->
    <line x1="118" y1="88" x2="175" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="225" y1="92" x2="282" y2="78" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="192" y1="125" x2="160" y2="145" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="218" y1="118" x2="262" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="318" y1="78" x2="382" y2="112" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  </g>
  
  <!-- SOC Assistant Panel -->
  <g transform="translate(660, 480)">
    <rect x="0" y="0" width="440" height="200" rx="12" fill="rgba(20,20,35,0.8)" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="bold" font-family="system-ui">🤖 AI SOC Assistant</text>
    <circle cx="410" cy="20" r="6" fill="#22c55e"/>
    <text x="390" y="24" text-anchor="end" fill="#888" font-size="10" font-family="system-ui">Online</text>
    
    <!-- Chat messages -->
    <rect x="20" y="50" width="280" height="40" rx="8" fill="rgba(124,58,237,0.2)"/>
    <text x="30" y="70" fill="#a78bfa" font-size="11" font-family="system-ui">🤖 I'm analyzing 12 critical incidents from</text>
    <text x="30" y="82" fill="#a78bfa" font-size="11" font-family="system-ui">the last hour. Here's what I found...</text>
    
    <rect x="100" y="100" width="320" height="30" rx="8" fill="rgba(255,255,255,0.05)"/>
    <text x="110" y="120" fill="#888" font-size="11" font-family="system-ui">👤 What are the most critical threats today?</text>
    
    <!-- Input area -->
    <rect x="20" y="150" width="360" height="35" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="35" y="172" fill="#666" font-size="11" font-family="system-ui">Ask about incidents, IOCs, or threats...</text>
    <rect x="390" y="155" width="30" height="25" rx="6" fill="url(#cardGrad2)"/>
    <text x="405" y="172" text-anchor="middle" fill="#fff" font-size="14">→</text>
  </g>
</svg>